<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Laboratories // Clearance Node</title>

<style>
body {
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ffcc;
}

/* 🏛️ GOVERNMENT LOGIN UI */
#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
}

.panel {
  border:1px solid #00ffcc;
  padding:12px;
  width:320px;
  margin:10px;
  text-align:center;
}

input, button {
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px;
  margin-top:10px;
  font-family:monospace;
  width:200px;
}

button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

/* TERMINAL */
#terminal {
  display:none;
  padding:20px;
}

#output {
  height:70vh;
  overflow-y:auto;
  white-space:pre-wrap;
  border:1px solid #00ffcc;
  padding:10px;
}

#commandInput {
  width:100%;
  padding:10px;
  background:black;
  border:none;
  border-top:1px solid #00ffcc;
  color:#00ffcc;
  outline:none;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 blue; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<!-- 🏛️ GOVERNMENT LOGIN SCREEN -->
<div id="loginScreen">

  <div class="panel">
    <h2>UNITED SYSTEMS CLEARANCE PORTAL</h2>
    <p>Stellar Laboratories Secure Access Node</p>
  </div>

  <div class="panel">
    ⚠ AUTHORIZED PERSONNEL ONLY ⚠<br>
    ALL ACCESS IS LOGGED AND MONITORED
  </div>

  <div class="panel">
    SYSTEM STATUS: ONLINE<br>
    NETWORK: STABLE<br>
    RESIDUAL LAYER: <span class="glitch">DETECTED</span>
  </div>

  <input type="password" id="password" placeholder="Enter Clearance Code">
  <button onclick="login()">AUTHENTICATE</button>

  <p id="msg"></p>
</div>

<!-- 💻 TERMINAL -->
<div id="terminal">
  <div id="output"></div>
  <input id="commandInput" placeholder="type command...">
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");

let adminMode = false;

/* PRINT */
function print(t){
  output.innerHTML += t + "<br>";
  output.scrollTop = output.scrollHeight;
}

/* 🔐 FIXED GOVERNMENT LOGIN */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  if (!p) {
    msg.innerText = "ACCESS CODE REQUIRED";
    return;
  }

  msg.innerText = "AUTHENTICATING...";

  setTimeout(() => {

    const loginScreen = document.getElementById("loginScreen");
    const terminal = document.getElementById("terminal");

    if (
      p === "helios" ||
      p === "aether" ||
      p === "admin" ||
      p === "030714"
    ) {

      // 🔐 SAFE SWITCH (NO BLACK SCREEN BUG)
      loginScreen.style.display = "none";
      terminal.style.display = "block";

      print("ACCESS GRANTED");
      print("CONNECTING STELLAR NETWORK...");
      print("CLEARANCE VERIFIED");

      if (p === "helios") print("LEVEL 1 ACCESS");
      else if (p === "aether") print("LEVEL 2 ACCESS + SIGNAL ANOMALY");
      else if (p === "admin" || p === "030714") {
        print("ADMIN ACCESS GRANTED");
        print("RESIDUAL LINK ACTIVE");
        adminMode = true;
      }

      print("\nType 'help'");

    } else {
      msg.innerText = "ACCESS DENIED";
      document.getElementById("password").value = "";
    }

  }, 900);
}

/* COMMAND SYSTEM */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const cmd = input.value.trim().toLowerCase();
    print("> " + cmd);
    process(cmd);
    input.value = "";
  }
});

function process(cmd) {

  if (cmd === "help") {
    print("commands: help, projects, logs, signal, clear");

    if (adminMode) {
      print("admin: inspect, trace, override-core");
    }
  }

  else if (cmd === "projects") {
    print("HELIOS / AETHER / NULL SYSTEMS");
  }

  else if (cmd === "logs") {
    print("pattern key: 030714");
  }

  else if (cmd === "signal") {
    print("connecting signal...");
    print("response unstable...");
  }

  else if (cmd === "inspect" && adminMode) {
    print("SYSTEM IS OBSERVING BACK");
  }

  else if (cmd === "trace" && adminMode) {
    print("ORIGIN: YOU");
  }

  else if (cmd === "override-core" && adminMode) {
    print("CORE OVERRIDE INITIATED");
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}
</script>

</body>
</html>
