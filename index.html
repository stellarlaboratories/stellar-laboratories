<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stellar Laboratories // Clearance Node</title>
  <style>
    body {
      margin: 0;
      background: #121212;
      font-family: 'Courier New', monospace;
      color: #00ffcc;
    }

    /* LOGIN */
    #loginScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #121212;
      z-index: 9999;
    }

    .panel {
      border: 1px solid #00ffcc;
      padding: 12px;
      width: 340px;
      margin: 10px;
      text-align: center;
      background: rgba(0, 255, 204, 0.1); /* Slight transparent background */
      border-radius: 8px;
    }

    input, button {
      background: #121212;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 10px;
      margin-top: 10px;
      font-family: monospace;
      width: 220px;
      border-radius: 8px;
    }

    button:hover {
      background: #00ffcc;
      color: black;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
    }

    /* TERMINAL */
    #terminal {
      display: none;
      padding: 20px;
      background: #1b1b1b;
      border-radius: 8px;
      width: 80%;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    #output {
      height: 70vh;
      overflow-y: auto;
      white-space: pre-wrap;
      border: 1px solid #00ffcc;
      padding: 20px;
      background: #0c0c0c;
      border-radius: 8px;
      font-size: 16px;
      color: #00ffcc;
      box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.3);
    }

    /* CURSOR */
    .cursor {
      display: inline-block;
      width: 10px;
      height: 16px;
      background: #00ffcc;
      margin-left: 3px;
      animation: blink 0.8s infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    #commandInput {
      width: 100%;
      padding: 12px;
      background: #121212;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      outline: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 12px;
    }

    /* Input focus effect */
    #commandInput:focus {
      border-color: #33ff99;
      box-shadow: 0 0 5px rgba(51, 255, 153, 0.5);
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="panel">
    <h2>UNITED SYSTEMS CLEARANCE PORTAL</h2>
    <p>Stellar Laboratories Secure Node</p>
  </div>

  <div class="panel">
    ⚠ AUTHORIZED PERSONNEL ONLY ⚠<br>
    ALL ACCESS IS MONITORED
  </div>

  <div class="panel">
    SYSTEM STATUS: ONLINE<br>
    RESIDUAL LAYER: DETECTED
  </div>

  <input type="password" id="password" placeholder="Enter Clearance Code">
  <button onclick="login()">AUTHENTICATE</button>

  <p id="msg"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <div id="output"></div>
  <span id="cursor" class="cursor"></span>
  <input id="commandInput" placeholder="type command...">
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");
const cursor = document.getElementById("cursor");

let signalLevel = 0;
let adminMode = false;
let failedAttempts = 0;

/* CURSOR */
function moveCursor() {
  output.appendChild(cursor);
}

/* TYPEWRITER */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function print(text) {
  const line = document.createElement("div");
  output.appendChild(line);

  for (let char of text) {
    line.innerHTML += char;
    output.appendChild(cursor);
    await sleep(8);
  }

  output.appendChild(cursor);
}

/* LOGIN (Enhanced Security) */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  const valid = ["helios", "aether", "admin", "030714"];
  const systemResponses = [
    "ACCESS CODE REQUIRED",
    "AUTHENTICATING...",
    "ACCESS DENIED",
    "WARNING: Unauthorized access attempt detected. SECURITY PROTOCOL ACTIVATED."
  ];

  if (!p) {
    msg.innerText = systemResponses[0];
    return;
  }

  msg.innerText = systemResponses[1];

  setTimeout(async () => {
    if (!valid.includes(p)) {
      msg.innerText = systemResponses[2];
      failedAttempts++;
      
      if (failedAttempts >= 3) {
        print("WARNING: Multiple failed access attempts detected.");
        print("ALERT: SYSTEM LOCKDOWN INITIATED!");
      }
      document.getElementById("password").value = "";
      return;
    }

    // Reset failed attempts after successful login
    failedAttempts = 0;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("terminal").style.display = "block";

    output.appendChild(cursor);

    await boot(p);

  }, 800);
}

/* BOOT */
async function boot(p) {
  await print("Booting to MS-DOS 6.22...");
  await print("Copyright (c) Microsoft Corp 1981-1994.");
  await print("\nACCESS GRANTED");
  await print("CONNECTING STELLAR NETWORK...");
  await print("LOADING ARCHIVE FILE SYSTEM...\n");

  if (p === "helios") await print("LEVEL 1 CLEARANCE");
  else if (p === "aether") await print("LEVEL 2 CLEARANCE + SIGNAL ANOMALY");
  else if (p === "admin" || p === "030714") {
    await print("ADMIN CLEARANCE GRANTED");
    adminMode = true;
  }

  await print("\nTYPE 'help'");
  await print("ACCESS PERSONNEL ARCHIVE: TYPE 'staff' OR OPEN /scientist.html");
}

/* FILE SYSTEM */
const fs = {
  "/": {
    type: "dir",
    files: {
      helios: {
        type: "dir",
        files: {
          "log1.txt": { type: "file", content: "HELIOS REPORT: Subject adapts to observation." }
        }
      },
      aether: {
        type: "dir",
        files: {
          "signal.txt": { type: "file", content: "AETHER SIGNAL: Strength increases when observed." }
        }
      },
      residual: {
        type: "dir",
        files: {
          "observer.log": { type: "file", content: "System reconstructs observer behavior." },
          "encrypted.txt": { type: "file", content: "ENCRYPTED: 4a63bbf7bd31321b" }
        }
      },
      stellar: {
        type: "dir",
        files: {
          "founder.txt": { type: "file", content: "STELLAR: Founder of Stellar Laboratories. The visionary behind the study of signal anomalies and residual consciousness. Believed that through technology, humanity could commune with forgotten realms and even manipulate reality itself. Disappeared under mysterious circumstances during a failed experiment in 1994." }
        }
      }
    }
  }
};

let path = ["/"];

function dir() {
  let ref = fs["/"];
  for (let i = 1; i < path.length; i++) ref = ref.files[path[i]];
  return ref;
}

function ls() {
  let d = dir();
  print("contents:");
  for (let k in d.files) print("- " + k);
}

function cd(x) {
  let d = dir();
  if (x === "..") return path.pop();
  if (d.files[x]) path.push(x);
}

function read(f) {
  let d = dir();
  if (d.files[f]) print("\n" + d.files[f].content + "\n");
}

/* COMMANDS */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    let cmd = input.value.trim().toLowerCase();
    print("> " + cmd);
    run(cmd);
    input.value = "";
  }
});

function run(cmd) {

  if (cmd === "help") {
    print("ls, cd <folder>, read <file>, clear, signal, decrypt <file>");
    print("hint: staff / personnel archive available");
    print("new: info, shutdown");
  }

  else if (cmd === "ls") ls();

  else if (cmd.startsWith("cd ")) cd(cmd.split(" ")[1]);

  else if (cmd.startsWith("read ")) read(cmd.split(" ")[1]);

  else if (cmd === "signal") {
    signalLevel++;
    print("connecting signal...");
    if (signalLevel === 1) print("weak transmission");
    else if (signalLevel === 2) print("signal stabilizing");
    else if (signalLevel === 3) print("WARNING: SIGNAL RESPONSE DETECTED");
    else print("??? : observer identified");
  }

  else if (cmd === "staff") {
    print("REDIRECTING TO PERSONNEL ARCHIVE...");
    setTimeout(() => {
      window.location.href = "scientist.html";
    }, 800);
  }

  else if (cmd === "decrypt") {
    let file = cmd.split(" ")[1];
    if (file === "encrypted.txt") {
      print("DECRYPTION COMPLETE: This file contains a critical secret. Proceed with caution.");
      print("Encrypted Data: 4a63bbf7bd31321b -> UNLOCKED: SYSTEM FAILURE IMMINENT.");
    }
  }

  else if (cmd === "shutdown") {
    print("Shutting down system...");
    print("Critical system failure detected. Entity interference detected during shutdown sequence.");
    print("WARNING: Shutdown will trigger residual echo amplification. Possible consequences for system and observer.");
    print("System shutdown complete.");
  }

  else if (cmd === "info") {
    print("Stellar Laboratories: Official Research Node.");
    print("Primary Research Focus: ");
    print("- Signal Anomalies");
    print("- Dimensional Echoes");
    print("- Observer Effect");
    print("- Interaction with entities beyond our realm");
    print("\nPersonnel involved in this project:");
    print("- Dr. Eleanor Helios (Lead Researcher) - Subject Helios Experiment");
    print("- Dr. Lucius Aether (Signal Specialist) - Aether Signal Analysis");
    print("- Dr. Miles Residual (System Architect) - Residual Layer Detection");
    print("\nFounder: Stellar");
    print("Founder’s Biography: A visionary scientist who believed that technology could unlock gateways to alternate dimensions. Disappeared mysteriously in 1994 under unknown circumstances.");
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}
</script>

</body>
</html>
