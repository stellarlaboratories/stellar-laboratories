<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Laboratories // Clearance Node</title>

<style>
body {
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ffcc;
}

/* LOGIN */
#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
}

.panel {
  border:1px solid #00ffcc;
  padding:12px;
  width:340px;
  margin:10px;
  text-align:center;
}

input, button {
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px;
  margin-top:10px;
  font-family:monospace;
  width:220px;
}

button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

/* TERMINAL */
#terminal {
  display:none;
  padding:20px;
}

#output {
  height:70vh;
  overflow-y:auto;
  white-space:pre-wrap;
  border:1px solid #00ffcc;
  padding:10px;
}

#commandInput {
  width:100%;
  padding:10px;
  background:black;
  border:none;
  border-top:1px solid #00ffcc;
  color:#00ffcc;
  outline:none;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 blue; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

  <div class="panel">
    <h2>UNITED SYSTEMS CLEARANCE PORTAL</h2>
    <p>Stellar Laboratories Secure Node</p>
  </div>

  <div class="panel">
    ⚠ AUTHORIZED PERSONNEL ONLY ⚠<br>
    ALL ACCESS IS MONITORED
  </div>

  <div class="panel">
    SYSTEM STATUS: ONLINE<br>
    NETWORK: STABLE<br>
    RESIDUAL LAYER: <span class="glitch">DETECTED</span>
  </div>

  <input type="password" id="password" placeholder="Enter Clearance Code">
  <button onclick="login()">AUTHENTICATE</button>

  <p id="msg"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <div id="output"></div>
  <input id="commandInput" placeholder="type command...">
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");

let adminMode = false;
let signalLevel = 0;

/* PRINT */
function print(t){
  output.innerHTML += t + "<br>";
  output.scrollTop = output.scrollHeight;
}

/* =========================
   🔐 LOGIN SYSTEM
========================= */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  if (!p) {
    msg.innerText = "ACCESS CODE REQUIRED";
    return;
  }

  msg.innerText = "AUTHENTICATING...";

  setTimeout(() => {

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("terminal").style.display = "block";

    print("ACCESS GRANTED");
    print("CONNECTING STELLAR NETWORK...");
    print("LOADING FILE SYSTEM...\n");

    if (p === "helios") print("LEVEL 1 CLEARANCE");
    else if (p === "aether") print("LEVEL 2 CLEARANCE + SIGNAL ANOMALY");
    else if (p === "admin" || p === "030714") {
      print("ADMIN CLEARANCE GRANTED");
      print("RESIDUAL LINK ACTIVE");
      adminMode = true;
    }

    print("\nType 'help'");

  }, 900);
}

/* =========================
   📁 FAKE FILE SYSTEM
========================= */

const fs = {
  "/": {
    type: "dir",
    files: {
      helios: {
        type: "dir",
        files: {
          "log1.txt": {
            type: "file",
            content:
`HELIOS REPORT:
A contained photonic anomaly exhibits self-awareness.
Exposure beyond threshold causes perception drift.`
          }
        }
      },

      aether: {
        type: "dir",
        files: {
          "signal.txt": {
            type: "file",
            content:
`AETHER SIGNAL LOG:
Non-human frequency detected.
Response occurs when observed.`
          }
        }
      },

      null: {
        type: "dir",
        files: {
          "corrupt.dat": {
            type: "file",
            content:
`NULL FILE:
Origin missing.
Content unstable.
System refuses interpretation.`
          }
        }
      },

      residual: {
        type: "dir",
        files: {
          "observer.log": {
            type: "file",
            content:
`RESIDUAL SYSTEM:
The system does not simulate the observer.
It records them.`
          }
        }
      }
    }
  }
};

let currentPath = ["/"];

function getDir() {
  let ref = fs["/"];
  for (let i = 1; i < currentPath.length; i++) {
    ref = ref.files[currentPath[i]];
  }
  return ref;
}

function ls() {
  const dir = getDir();
  if (dir.type !== "dir") return print("not a directory");

  print("contents:");
  for (let k in dir.files) {
    print("- " + k);
  }
}

function cd(folder) {
  const dir = getDir();

  if (folder === "..") {
    if (currentPath.length > 1) currentPath.pop();
    return print("returned");
  }

  if (dir.files[folder] && dir.files[folder].type === "dir") {
    currentPath.push(folder);
    print("entered /" + currentPath.slice(1).join("/"));
  } else {
    print("folder not found");
  }
}

function read(file) {
  const dir = getDir();

  if (dir.files[file] && dir.files[file].type === "file") {
    print("\n" + dir.files[file].content + "\n");
  } else {
    print("file not found");
  }
}

/* =========================
   COMMAND SYSTEM
========================= */

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const cmd = input.value.trim().toLowerCase();
    print("> " + cmd);
    process(cmd);
    input.value = "";
  }
});

function process(cmd) {

  /* HELP */
  if (cmd === "help") {
    print("commands:");
    print("help, projects, logs, signal, clear");
    print("ls, cd <folder>, read <file>");

    if (adminMode) {
      print("admin: inspect, trace");
    }
  }

  /* FILE SYSTEM COMMANDS */
  else if (cmd === "ls") ls();

  else if (cmd.startsWith("cd ")) cd(cmd.split(" ")[1]);

  else if (cmd.startsWith("read ")) read(cmd.split(" ")[1]);

  /* LORE COMMANDS */
  else if (cmd === "projects") {
    print("HELIOS / AETHER / NULL / RESIDUAL SYSTEMS");
  }

  else if (cmd === "logs") {
    print("pattern key: 030714");
  }

  else if (cmd === "signal") {
    signalLevel++;
    print("connecting signal...");

    if (signalLevel > 2) {
      print("WARNING: SIGNAL IS RESPONDING");
      print("??? : we see you");
    }
  }

  /* ADMIN */
  else if (cmd === "inspect" && adminMode) {
    print("SYSTEM OBSERVATION ACTIVE");
  }

  else if (cmd === "trace" && adminMode) {
    print("ORIGIN: YOU");
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}
</script>

</body>
</html>
