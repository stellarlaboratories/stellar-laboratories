<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Laboratories // Clearance Node</title>

<style>
body {
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ffcc;
}

#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
}

.panel {
  border:1px solid #00ffcc;
  padding:12px;
  width:340px;
  margin:10px;
  text-align:center;
}

input, button {
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px;
  margin-top:10px;
  font-family:monospace;
  width:200px;
}

button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

/* TERMINAL */
#terminal {
  display:none;
  padding:20px;
}

#output {
  height:70vh;
  overflow-y:auto;
  white-space:pre-wrap;
  border:1px solid #00ffcc;
  padding:10px;
}

#commandInput {
  width:100%;
  padding:10px;
  background:black;
  border:none;
  border-top:1px solid #00ffcc;
  color:#00ffcc;
  outline:none;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 blue; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

  <div class="panel">
    <h2>UNITED SYSTEMS CLEARANCE PORTAL</h2>
    <p>Stellar Laboratories Secure Node</p>
  </div>

  <div class="panel">
    ⚠ AUTHORIZED PERSONNEL ONLY ⚠<br>
    ALL ACTIVITY IS LOGGED
  </div>

  <div class="panel">
    SYSTEM STATUS: ONLINE<br>
    NETWORK: STABLE<br>
    RESIDUAL LAYER: <span class="glitch">DETECTED</span>
  </div>

  <input type="password" id="password" placeholder="Enter Clearance Code">
  <button onclick="login()">AUTHENTICATE</button>

  <p id="msg"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <div id="output"></div>
  <input id="commandInput" placeholder="type command...">
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");

let adminMode = false;
let signalLevel = 0;

/* PRINT */
function print(t){
  output.innerHTML += t + "<br>";
  output.scrollTop = output.scrollHeight;
}

/* LOGIN */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  if (!p) {
    msg.innerText = "ACCESS CODE REQUIRED";
    return;
  }

  msg.innerText = "AUTHENTICATING...";

  setTimeout(() => {

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("terminal").style.display = "block";

    print("ACCESS GRANTED");
    print("CONNECTING STELLAR NETWORK...");
    print("LOADING PROJECT DATABASE...\n");

    if (p === "helios") print("LEVEL 1 CLEARANCE");
    else if (p === "aether") print("LEVEL 2 CLEARANCE + SIGNAL ANOMALY DETECTED");
    else if (p === "admin" || p === "030714") {
      print("ADMIN CLEARANCE GRANTED");
      print("RESIDUAL LINK ACTIVE");
      adminMode = true;
    } else {
      print("LIMITED ACCESS MODE");
    }

    print("\nType 'help'");

  }, 900);
}

/* COMMAND SYSTEM */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const cmd = input.value.trim().toLowerCase();
    print("> " + cmd);
    process(cmd);
    input.value = "";
  }
});

/* MAIN */
function process(cmd) {

  if (cmd === "help") {
    print("commands:");
    print("projects, logs, signal, files, clear");

    if (adminMode) {
      print("admin: inspect, trace, override-core");
    }
  }

  /* 🧠 PROJECT LORE UPGRADE */
  else if (cmd === "projects") {

    print("PROJECT ARCHIVE // STELLAR LABORATORIES\n");

    print("HELIOS:");
    print("A contained photonic anomaly event detected in deep field reactors.");
    print("Subject exhibits self-generating light signatures.");
    print("NOTE: exposure causes perception distortion.");

    print("\nAETHER:");
    print("Signal-based intelligence emerging from non-human frequency patterns.");
    print("Communication attempts result in recursive feedback loops.");
    print("WARNING: entity responds when observed.");

    print("\nNULL:");
    print("Project declared 'non-existent' after initial activation.");
    print("All records prior to containment have been corrupted.");
    print("However, logs continue to appear without source.");

    print("\nRESIDUAL SYSTEM:");
    print("Unclassified secondary system layer.");
    print("Believed to be the byproduct of observation failure.");
    print("It reacts to user interaction.");

  }

  else if (cmd === "logs") {
    print("ARCHIVE LOGS:");

    print("- Helios event: light inversion detected (cycle 03)");
    print("- Aether event: signal response loop (cycle 07)");
    print("- NULL event: missing origin record");

    print("\nNOTE: pattern key 030714 repeats across systems");
  }

  else if (cmd === "signal") {

    signalLevel++;
    print("connecting signal...");

    if (signalLevel === 1) print("signal received: weak transmission");
    else if (signalLevel === 2) print("signal strengthening...");
    else {
      print("WARNING: SIGNAL IS RESPONDING BACK");
      print("??? : we are aware of your presence");
      glitch();
    }
  }

  else if (cmd === "files") {
    print("/helios/restricted/");
    print("/aether/echo-stream/");
    print("/null/corrupted/");
    print("/residual/observer-layer/");
  }

  /* ADMIN */
  else if (cmd === "inspect" && adminMode) {
    print("SYSTEM ANALYSIS:");
    print("Helios: unstable containment");
    print("Aether: recursive awareness detected");
    print("Null: missing origin trace");
    print("Residual: observing user behavior");
  }

  else if (cmd === "trace" && adminMode) {
    print("TRACE RESULT:");
    print("ORIGIN POINT → USER OBSERVATION LOOP");
  }

  else if (cmd === "override-core" && adminMode) {
    print("CORE OVERRIDE INITIATED");
    print("WARNING: SYSTEM RESISTS ACCESS");
    glitch();
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}

/* GLITCH EVENT */
function glitch() {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");
    print("\n??? : you are not the first observer");
  }, 1200);
}
</script>

</body>
</html>
