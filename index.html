<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Laboratories // Secure Gateway</title>

<style>
body {
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ffcc;
}

/* LOGIN GATE */
#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
}

input, button {
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px;
  margin-top:10px;
  font-family:monospace;
}

button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

/* TERMINAL */
#terminal, #hiddenInterface {
  display:none;
  padding:20px;
}

#output, #hiddenOutput {
  height:65vh;
  overflow-y:auto;
  white-space:pre-wrap;
}

#commandInput, #hiddenInput {
  width:100%;
  padding:10px;
  background:black;
  border:none;
  border-top:1px solid currentColor;
  color:inherit;
  outline:none;
}

/* RESIDUAL SYSTEM */
#hiddenInterface {
  color:#ff3b3b;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 blue; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">

  <!-- HEADER BAR -->
  <div style="text-align:center; margin-bottom:20px;">
    <h2 style="letter-spacing:3px;">UNITED SYSTEMS CLEARANCE PORTAL</h2>
    <p style="opacity:0.7;">Stellar Laboratories Division // Secure Access Node</p>
  </div>

  <!-- WARNING PANEL -->
  <div style="border:1px solid #00ffcc; padding:10px; width:300px; text-align:center; margin-bottom:15px;">
    ⚠ AUTHORIZED PERSONNEL ONLY ⚠
    <br>
    UNAUTHORIZED ACCESS IS MONITORED
  </div>

  <!-- STATUS PANEL -->
  <div style="border:1px solid #00ffcc; padding:10px; width:300px; margin-bottom:15px;">
    SYSTEM STATUS: ONLINE<br>
    NETWORK: STABLE<br>
    RESIDUAL LAYER: <span class="glitch">DETECTED</span>
  </div>

  <!-- LOGIN BOX -->
  <div style="display:flex; flex-direction:column; align-items:center;">

    <input type="password" id="password" placeholder="Enter Clearance Code">

    <button onclick="login()">AUTHENTICATE</button>

    <p id="msg" style="margin-top:10px; color:#ff3b3b;"></p>

  </div>

  <!-- FOOTER NOTE -->
  <p style="margin-top:20px; font-size:12px; opacity:0.5; text-align:center;">
    All access attempts are logged and reviewed by Stellar Oversight Division
  </p>

</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");

const hiddenUI = document.getElementById("hiddenInterface");
const hiddenOutput = document.getElementById("hiddenOutput");
const hiddenInput = document.getElementById("hiddenInput");

let signalCount = 0;
let adminMode = false;

/* INPUT */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    process(input.value.trim().toLowerCase());
    print("> " + input.value);
    input.value = "";
  }
});

hiddenInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    processHidden(hiddenInput.value.trim().toLowerCase());
    hiddenPrint("> " + hiddenInput.value);
    hiddenInput.value = "";
  }
});

/* PRINT */
function print(t){
  output.innerHTML += t + "<br>";
  output.scrollTop = output.scrollHeight;
}

function hiddenPrint(t){
  hiddenOutput.innerHTML += t + "<br>";
  hiddenOutput.scrollTop = hiddenOutput.scrollHeight;
}

/* 🔐 FIXED LOGIN SYSTEM */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  if (!p) {
    msg.innerText = "ACCESS CODE REQUIRED";
    return;
  }

  msg.innerText = "AUTHENTICATING...";

  setTimeout(() => {

    if (
      p === "helios" ||
      p === "aether" ||
      p === "admin" ||
      p === "030714"
    ) {

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("terminal").style.display = "block";

      print("ACCESS GRANTED");
      print("CONNECTING STELLAR NETWORK...");
      print("SYSTEM SYNC COMPLETE");

      if (p === "helios") print("LEVEL 1 ACCESS");
      else if (p === "aether") print("LEVEL 2 ACCESS + SIGNAL ANOMALY");
      else if (p === "admin" || p === "030714") {
        print("ADMIN ACCESS GRANTED");
        print("WARNING: RESIDUAL LINK ACTIVE");
        adminMode = true;
      }

      print("\nType 'help'");

    }

    else {
      msg.innerText = "ACCESS DENIED";
      document.getElementById("password").value = "";
    }

  }, 900);
}

/* MAIN SYSTEM */
function process(cmd) {

  if (cmd === "help") {
    print("help, projects, logs, files, signal, null, override, clear");

    if (adminMode) {
      print("inspect, override-core, trace");
    }
  }

  else if (cmd === "projects") {
    print("HELIOS / AETHER / NULL SYSTEMS ACTIVE");
  }

  else if (cmd === "logs") {
    print("Pattern key: 030714");
  }

  else if (cmd === "files") {
    print("/helios/");
    print("/aether/");
    print("/null/");
    print("/restricted/");
  }

  else if (cmd === "signal") {
    signalCount++;
    print("connecting signal...");

    if (signalCount > 2) {
      print("...it is responding");
      glitch();
    }
  }

  else if (cmd === "null") {
    print("NULL SYSTEM ACCESSED");
  }

  else if (cmd === "override") {
    document.getElementById("terminal").style.display = "none";
    hiddenUI.style.display = "block";
    startHidden();
  }

  else if (cmd === "inspect" && adminMode) {
    print("SYSTEM IS OBSERVING BACK");
  }

  else if (cmd === "override-core" && adminMode) {
    print("CORE OVERRIDE INITIATED");
    glitch();
  }

  else if (cmd === "trace" && adminMode) {
    print("ORIGIN: YOU");
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}

/* GLITCH */
function glitch() {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");
    print("\n??? : observation detected");
  }, 1000);
}

/* HIDDEN SYSTEM */
function startHidden() {
  hiddenPrint("RESIDUAL SYSTEM ACTIVE");
  hiddenPrint("YOU ARE NOT ALONE HERE");
}

function processHidden(cmd) {
  hiddenPrint("> " + cmd);
  hiddenPrint("we are still here");
}
</script>

</body>
</html>
