<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Laboratories // Secure Gateway</title>

<style>
body {
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ffcc;
}

/* LOGIN GATE (BLOCKS EVERYTHING) */
#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
}

input, button {
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px;
  margin-top:10px;
  font-family:monospace;
}

button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

/* TERMINAL */
#terminal, #hiddenInterface {
  display:none;
  padding:20px;
}

#output, #hiddenOutput {
  height:65vh;
  overflow-y:auto;
  white-space:pre-wrap;
}

#commandInput, #hiddenInput {
  width:100%;
  padding:10px;
  background:black;
  border:none;
  border-top:1px solid currentColor;
  color:inherit;
  outline:none;
}

#hiddenInterface {
  color:#ff3b3b;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 blue; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<!-- 🔐 LOGIN GATE -->
<div id="loginScreen">
  <h1 class="glitch">STELLAR LABORATORIES</h1>
  <p>AUTHORIZED ACCESS REQUIRED</p>
  <input type="password" id="password" placeholder="enter access code">
  <button onclick="login()">ENTER</button>
  <p id="msg"></p>
</div>

<!-- MAIN TERMINAL -->
<div id="terminal">
  <div id="output"></div>
  <input id="commandInput" placeholder="type command...">
</div>

<!-- HIDDEN SYSTEM -->
<div id="hiddenInterface">
  <div id="hiddenOutput"></div>
  <input id="hiddenInput" placeholder="...">
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");

const hiddenUI = document.getElementById("hiddenInterface");
const hiddenOutput = document.getElementById("hiddenOutput");
const hiddenInput = document.getElementById("hiddenInput");

let signalCount = 0;
let adminMode = false;

/* INPUT */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    process(input.value.trim().toLowerCase());
    print("> " + input.value);
    input.value = "";
  }
});

hiddenInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    processHidden(hiddenInput.value.trim().toLowerCase());
    hiddenPrint("> " + hiddenInput.value);
    hiddenInput.value = "";
  }
});

/* PRINT */
function print(t){
  output.innerHTML += t + "<br>";
  output.scrollTop = output.scrollHeight;
}

function hiddenPrint(t){
  hiddenOutput.innerHTML += t + "<br>";
  hiddenOutput.scrollTop = hiddenOutput.scrollHeight;
}

/* 🔐 LOGIN GATE LOGIC */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  if (!p) {
    msg.innerText = "ACCESS CODE REQUIRED";
    return;
  }

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("terminal").style.display = "block";

  print("AUTHENTICATING...");
  print("CONTACTING STELLAR NETWORK...");

  setTimeout(() => {

    if (p === "helios") {
      print("LEVEL 1 ACCESS GRANTED");
    }

    else if (p === "aether") {
      print("LEVEL 2 ACCESS GRANTED");
      print("SIGNAL ANOMALY DETECTED");
    }

    else if (p === "admin" || p === "030714") {
      print("ADMIN ACCESS GRANTED");
      print("WARNING: RESIDUAL SYSTEM LINK ACTIVE");
      print("THIS INTERFACE SHOULD NOT BE USED");
      adminMode = true;
    }

    else {
      print("ACCESS GRANTED (LIMITED USER MODE)");
    }

    print("\nType 'help'");

  }, 1200);
}

/* MAIN SYSTEM */
function process(cmd) {

  if (cmd === "help") {
    print("commands: help, projects, logs, files, signal, null, override, clear");

    if (adminMode) {
      print("admin: inspect, override-core, trace");
    }
  }

  else if (cmd === "projects") {
    print("HELIOS / AETHER / NULL ACTIVE SYSTEMS");
  }

  else if (cmd === "logs") {
    print("Pattern key: 030714");
  }

  else if (cmd === "files") {
    print("/helios/");
    print("/aether/");
    print("/null/");
    print("/restricted/");
  }

  else if (cmd === "signal") {
    signalCount++;
    print("connecting signal...");

    if (signalCount > 2) {
      print("...it is responding back");
      glitch();
    }
  }

  else if (cmd === "null") {
    print("NULL SYSTEM ACCESSED");
  }

  else if (cmd === "override") {
    document.getElementById("terminal").style.display = "none";
    hiddenUI.style.display = "block";
    startHidden();
  }

  else if (cmd === "inspect" && adminMode) {
    print("SYSTEM IS OBSERVING BACK");
  }

  else if (cmd === "override-core" && adminMode) {
    print("CORE OVERRIDE INITIATED");
    glitch();
  }

  else if (cmd === "trace" && adminMode) {
    print("ORIGIN: YOU");
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}

/* GLITCH */
function glitch() {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");
    print("\n??? : observation detected");
  }, 1000);
}

/* HIDDEN SYSTEM */
function startHidden() {
  hiddenPrint("RESIDUAL SYSTEM ACTIVE");
  hiddenPrint("YOU ARE NOT ALONE HERE");
}

function processHidden(cmd) {
  hiddenPrint("> " + cmd);
  hiddenPrint("we are still here");
}
</script>

</body>
</html>
