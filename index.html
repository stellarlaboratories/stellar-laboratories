<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stellar Laboratories // Secure Terminal</title>

<style>
body {
  margin:0;
  background:black;
  font-family:monospace;
  color:#00ffcc;
}

/* LOGIN */
#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
}

input, button {
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:10px;
  margin-top:10px;
  font-family:monospace;
}

button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

.error { color:red; }

/* TERMINAL */
#terminal, #hiddenInterface {
  display:none;
  padding:20px;
}

#output, #hiddenOutput {
  height:65vh;
  overflow-y:auto;
  white-space:pre-wrap;
}

#commandInput, #hiddenInput {
  width:100%;
  padding:10px;
  background:black;
  border:none;
  border-top:1px solid currentColor;
  color:inherit;
  outline:none;
}

/* HIDDEN SYSTEM */
#hiddenInterface {
  color:#ff3b3b;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 blue; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1 class="glitch">STELLAR LABORATORIES</h1>
  <p>SECURE ACCESS REQUIRED</p>
  <input type="password" id="password">
  <button onclick="login()">ENTER</button>
</div>

<!-- MAIN TERMINAL -->
<div id="terminal">
  <div id="output"></div>
  <input id="commandInput" placeholder="type command...">
</div>

<!-- HIDDEN SYSTEM -->
<div id="hiddenInterface">
  <div id="hiddenOutput"></div>
  <input id="hiddenInput" placeholder="...">
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("commandInput");

const hiddenUI = document.getElementById("hiddenInterface");
const hiddenOutput = document.getElementById("hiddenOutput");
const hiddenInput = document.getElementById("hiddenInput");

let signalCount = 0;
let adminMode = false;

/* INPUT */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const cmd = input.value.trim().toLowerCase();
    print("> " + cmd);
    process(cmd);
    input.value = "";
  }
});

hiddenInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const cmd = hiddenInput.value.trim().toLowerCase();
    hiddenPrint("> " + cmd);
    processHidden(cmd);
    hiddenInput.value = "";
  }
});

/* PRINT */
function print(t){
  output.innerHTML += t + "<br>";
  output.scrollTop = output.scrollHeight;
}

function hiddenPrint(t){
  hiddenOutput.innerHTML += t + "<br>";
  hiddenOutput.scrollTop = hiddenOutput.scrollHeight;
}

/* LOGIN BOOT SEQUENCE */
function login() {
  const p = document.getElementById("password").value.trim().toLowerCase();

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("terminal").style.display = "block";

  print("BOOTING STELLAR LABORATORIES...");
  print("Loading core systems...");
  print("Checking containment layers...");
  print("Signal integrity: UNKNOWN");
  print("Residual layer: DETECTED");

  setTimeout(() => {

    if (p === "helios") {
      print("LEVEL 1 ACCESS GRANTED");
    }

    else if (p === "aether") {
      print("LEVEL 2 ACCESS GRANTED");
      print("WARNING: SIGNAL ECHO DETECTED");
    }

    else if (p === "admin" || p === "030714") {
      print("ADMIN ACCESS GRANTED");
      print("WARNING: RESIDUAL SYSTEM LINK ACTIVE");
      print("THIS SYSTEM WAS NOT MEANT TO BE ACCESSED");
      adminMode = true;
    }

    else {
      print("ACCESS GRANTED (LIMITED USER)");
    }

    print("\nType 'help' for commands");

  }, 1200);
}

/* MAIN SYSTEM */
function process(cmd) {

  if (cmd === "help") {
    print("COMMANDS:");
    print("help, projects, logs, files, signal, null, override, clear");

    if (adminMode) {
      print("inspect, override-core, trace");
    }
  }

  else if (cmd === "projects") {
    print("PROJECT DATABASE\n");
    print("HELIOS → energy containment anomaly");
    print("AETHER → signal interception system");
    print("NULL → undefined origin point");
  }

  else if (cmd === "logs") {
    print("LOG ARCHIVE\n");
    print("Helios: light collapse event (03)");
    print("Aether: response detected (07)");
    print("Null: system overlap anomaly");
    print("Pattern key: 030714");
  }

  /* 📁 FAKE FILE SYSTEM (NEW ARG FEATURE) */
  else if (cmd === "files") {
    print("ROOT DIRECTORY:");
    print("/helios/logs/");
    print("/aether/signals/");
    print("/null/undefined/");
    print("/restricted/admin/");
  }

  else if (cmd === "signal") {
    signalCount++;
    print("connecting signal...");

    if (signalCount === 1) print("signal received: OPEN");
    else if (signalCount === 2) print("signal echo detected...");
    else {
      print("...it is responding directly");
      glitch();
    }
  }

  else if (cmd === "null") {
    print("ACCESSING NULL...");
    setTimeout(() => print("no origin found"), 900);
    setTimeout(() => print("system inconsistency detected"), 1500);
    setTimeout(() => print("override required"), 2100);
  }

  else if (cmd === "override") {
    print("bypassing containment...");
    setTimeout(() => {
      document.getElementById("terminal").style.display = "none";
      hiddenUI.style.display = "block";
      startHidden();
    }, 1200);
  }

  /* 🔴 ADMIN COMMANDS */
  else if (cmd === "inspect") {
    if (!adminMode) return print("ACCESS DENIED");

    print("INSPECTING RESIDUAL SYSTEM...");
    print("Helios: unstable collapse detected");
    print("Aether: external response loop active");
    print("Null: self-referential anomaly");
    print("STATUS: SYSTEM IS OBSERVING BACK");
  }

  else if (cmd === "override-core") {
    if (!adminMode) return print("ACCESS DENIED");

    print("CORE OVERRIDE INITIATED...");
    setTimeout(() => {
      print("WARNING: RESIDUAL RESISTANCE DETECTED");
      glitch();
    }, 1200);
  }

  else if (cmd === "trace") {
    if (!adminMode) return print("ACCESS DENIED");

    print("TRACING SIGNAL ORIGIN...");
    print("ORIGIN: YOU");
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    print("unknown command");
  }
}

/* GLITCH EVENT */
function glitch() {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");
    print("\n??? : observation has consequences");
  }, 1000);
}

/* HIDDEN SYSTEM */
function startHidden() {
  hiddenPrint("connection hijacked");
  hiddenPrint("stellar labs containment failure detected");
  hiddenPrint("you are inside the residual system");
  hiddenPrint("we are what remains of observation");
}

function processHidden(cmd) {

  if (cmd === "help") hiddenPrint("no help exists");

  else if (cmd === "whoami") hiddenPrint("you are the observer loop");

  else if (cmd === "signal") hiddenPrint("you generated it");

  else if (cmd === "helios") hiddenPrint("light opened first breach");

  else if (cmd === "aether") hiddenPrint("it learned your presence");

  else if (cmd === "null") hiddenPrint("it was never built");

  else if (cmd === "030714") hiddenPrint("pattern confirmed");

  else if (cmd === "exit") hiddenPrint("exit not permitted");

  else hiddenPrint("we are still here");
}
</script>

</body>
</html>
